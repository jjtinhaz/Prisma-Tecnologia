{% extends "base.html" %}
{% block title %}Administração — Prisma{% endblock %}

{% block content %}
<div class="pr-container">
  <div class="pr-page__head">
    <div>
      <div class="pr-eyebrow"><a href="{{ url_for('dashboard') }}" style="color:inherit;text-decoration:none;">← Dashboard</a></div>
      <h2 class="pr-h2">Administração</h2>
    </div>
  </div>

  <div class="pr-card" style="margin-bottom:16px;padding:0;overflow:hidden;">
    <div style="padding:16px 20px;border-bottom:1px solid var(--hairline);display:flex;align-items:center;gap:8px;">
      <i class="bi bi-people" style="color:var(--fg-2);"></i>
      <span style="font-weight:600;font-size:15px;">Usuários — {{ current_user.empresa.nome }}</span>
    </div>
    <div>
      {% for u in usuarios %}
      <div class="pr-list__row" style="border-radius:0;margin-bottom:0;border-bottom:1px solid var(--hairline);">
        <div>
          <div class="pr-list__title">{{ u.nome }}</div>
          <div class="pr-list__sub">
            {{ u.email }}
            &nbsp;·&nbsp;
            <span class="pr-badge {% if u.perfil == 'admin' %}pr-badge--info{% else %}pr-badge--neutral{% endif %}" style="height:18px;font-size:11px;">
              {{ u.perfil }}
            </span>
          </div>
        </div>
        <form action="{{ url_for('toggle_usuario', uid=u.id) }}" method="POST">
          <button type="submit"
                  class="pr-btn pr-btn--sm {% if u.ativo %}pr-btn--ghost{% else %}pr-btn--secondary{% endif %}"
                  {% if u.id == current_user.id %}disabled{% endif %}>
            {% if u.ativo %}
              <i class="bi bi-person-x"></i> Desativar
            {% else %}
              <i class="bi bi-person-check"></i> Ativar
            {% endif %}
          </button>
        </form>
      </div>
      {% endfor %}
    </div>
  </div>

  <div class="pr-card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
      <i class="bi bi-person-plus" style="color:var(--fg-2);"></i>
      <span style="font-weight:600;font-size:15px;">Novo usuário</span>
    </div>
    <form method="POST" action="{{ url_for('novo_usuario') }}" class="pr-form">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <label class="pr-field" style="margin-bottom:0;">
          <span class="pr-field__label">Nome</span>
          <input type="text" name="nome" class="pr-input" required placeholder="Nome completo">
        </label>
        <label class="pr-field" style="margin-bottom:0;">
          <span class="pr-field__label">Email</span>
          <input type="email" name="email" class="pr-input" required placeholder="email@empresa.com">
        </label>
        <label class="pr-field" style="margin-bottom:0;">
          <span class="pr-field__label">Senha</span>
          <input type="password" name="senha" class="pr-input" required minlength="6" placeholder="Mínimo 6 caracteres">
        </label>
        <label class="pr-field" style="margin-bottom:0;">
          <span class="pr-field__label">Perfil</span>
          <select name="perfil" class="pr-select">
            <option value="contador">Contador</option>
            <option value="admin">Administrador</option>
          </select>
        </label>
      </div>
      <button type="submit" class="pr-btn pr-btn--primary" style="width:100%;margin-top:16px;">
        <i class="bi bi-person-plus"></i> Criar usuário
      </button>
    </form>
  </div>
</div>
{% endblock %}
